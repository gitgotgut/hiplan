        <text x="864" y="706" text-anchor="middle" font-family="Plus Jakarta Sans, sans-serif" font-size="10" font-weight="500" fill="#6B6480">#E8A440</text>
      
        <rect x="964" y="615" width="160" height="56" rx="8" fill="#D14D4D"/>
        <text x="1044" y="692" text-anchor="middle" font-family="Plus Jakarta Sans, sans-serif" font-size="10" font-weight="500" fill="#6B6480">Error</text>
        <text x="1044" y="706" text-anchor="middle" font-family="Plus Jakarta Sans, sans-serif" font-size="10" font-weight="500" fill="#6B6480">#D14D4D</text>
      

    <!-- Typography -->
    <text x="64" y="755" font-family="Plus Jakarta Sans, sans-serif" font-size="11" font-weight="600" fill="#6B6480" letter-spacing="1.5">TYPOGRAPHY</text>
    <text x="64" y="800" font-family="Fraunces, serif" font-size="28" font-weight="600" fill="#1A1527">Hugo keeps your</text>
    <text x="64" y="838" font-family="Fraunces, serif" font-size="28" font-weight="600" fill="#1A1527">finances in check.</text>
